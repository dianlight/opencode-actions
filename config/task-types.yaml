# Task type definitions with signals for classification
# Maps workflow/job/step patterns to task types

task_types:
  # Standard OpenCode task types
  - name: "Plan"
    description: "Planning, architecture decisions, task decomposition"
    signals:
      - "plan"
      - "architecture"
      - "design"
      - "breakdown"
      - "decompose"
      - "strategy"
      - "roadmap"
    relevant_subscores: ["reasoning", "instruction_following"]
    priority: "reasoning"

  - name: "Ask"
    description: "General Q&A, explanations, analysis"
    signals:
      - "ask"
      - "question"
      - "explain"
      - "how to"
      - "what is"
      - "why"
      - "help"
      - "clarify"
    relevant_subscores: ["instruction_following", "reasoning"]
    priority: "instruction_following"

  - name: "Code"
    description: "Code generation, implementation, refactoring"
    signals:
      - "code"
      - "implement"
      - "write code"
      - "generate code"
      - "refactor"
      - "bug fix"
      - "feature"
    relevant_subscores: ["coding"]
    priority: "coding"

  # GitHub workflow-specific task types
  - name: "issue-triage"
    description: "Triage, label, categorize, route issues"
    signals:
      - "triage"
      - "label"
      - "categorize"
      - "route"
      - "classify"
    relevant_subscores: ["instruction_following", "speed"]
    priority: "instruction_following"

  - name: "issue-implementation"
    description: "Implement, fix, resolve issues"
    signals:
      - "implement"
      - "fix issue"
      - "resolve issue"
      - "fix bug"
      - "resolve bug"
    relevant_subscores: ["coding"]
    priority: "coding"

  - name: "pr-review"
    description: "Review PRs, pull requests, diffs"
    signals:
      - "review"
      - "pr"
      - "pull request"
      - "diff"
      - "code review"
    relevant_subscores: ["reasoning"]
    priority: "reasoning"

  - name: "code-implementation"
    description: "Generate code, refactor, implement features"
    signals:
      - "generate code"
      - "refactor"
      - "implement feature"
      - "write code"
      - "code generation"
    relevant_subscores: ["coding"]
    priority: "coding"

  - name: "frontend-design"
    description: "UI design, components, layouts, mockups"
    signals:
      - "ui"
      - "design"
      - "component"
      - "layout"
      - "mockup"
      - "frontend"
      - "css"
      - "styling"
    relevant_subscores: ["vision", "coding"]
    priority: "vision"
    requires_vision: true

  - name: "frontend-testing"
    description: "Playwright, Cypress, E2E, frontend tests"
    signals:
      - "playwright"
      - "cypress"
      - "e2e"
      - "frontend test"
      - "browser test"
    relevant_subscores: ["coding"]
    priority: "coding"

  - name: "api-testing"
    description: "API testing, integration tests, OpenAPI, Postman"
    signals:
      - "api test"
      - "integration test"
      - "openapi"
      - "postman"
      - "rest api"
    relevant_subscores: ["coding", "reasoning"]
    priority: "coding"

  - name: "other"
    description: "Everything else"
    signals: []
    relevant_subscores: ["overall"]
    priority: "overall"

# Free-first policy: if free model scores within this % of best paid, prefer free
free_first_threshold_pct: 5
