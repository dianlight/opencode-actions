# Explicit workflow -> task type mapping
# Used when automatic classification is ambiguous or needs override
# Key: workflow filename (without extension)
# Value: task_type from task-types.yaml

workflow_task_map:
  "opencode-implement": "issue-implementation"
  "opencode-new-pr": "issue-implementation"
  "opencode-review": "pr-review"
  "opencode-triage-pr": "issue-triage"
  "opencode-triage-issue": "issue-triage"
