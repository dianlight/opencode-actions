group:
  repos: |
    dianlight/smartmontools-sdk
    dianlight/hasos_more_modules
    dianlight/srat
    dianlight/hassio-addons
  files:
    # Active workflows
    - source: .github/workflows/opencode-pr-review.yml
      dest: .github/workflows/opencode-pr-review.yml
    - source: .github/workflows/opencode-pr-comment.yml
      dest: .github/workflows/opencode-pr-comment.yml
    - source: .github/workflows/opencode-issue-handler.yml
      dest: .github/workflows/opencode-issue-handler.yml
    - source: .github/workflows/opencode-labels.yml
      dest: .github/workflows/opencode-labels.yml
    # Shared scripts
    - source: .github/scripts/auth.sh
      dest: .github/scripts/auth.sh
    - source: .github/scripts/pr-tasks.sh
      dest: .github/scripts/pr-tasks.sh
    # Shared composite action (opencode-run lifecycle)
    - source: .github/actions/opencode-run/action.yml
      dest: .github/actions/opencode-run/action.yml
    # Old files — synced as empty no-ops so they are harmless,
    # but also ensures they exist in the target (prevents issues
    # with stale triggers). Remove these entries once all targets
    # have been manually cleaned up.
    - source: .github/workflows/opencode.yml
      dest: .github/workflows/opencode.yml
    - source: .github/workflows/opencode-triage.yaml
      dest: .github/workflows/opencode-triage.yaml
    - source: .github/workflows/opencode-triage-pr.yaml
      dest: .github/workflows/opencode-triage-pr.yaml
    - source: .github/workflows/opencode-triage-issue.yaml
      dest: .github/workflows/opencode-triage-issue.yaml
    - source: .github/workflows/opencode-implement.yaml
      dest: .github/workflows/opencode-implement.yaml
    - source: .github/workflows/opencode-review.yaml
      dest: .github/workflows/opencode-review.yaml
