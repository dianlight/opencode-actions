name: opencode-run
description: >
  Shared lifecycle composite action for OpenCode workflow jobs.
  Handles the ack reaction, sticky status comment, and terminal
  react (hooray/−1) steps so individual jobs stay thin.

# ─────────────────────────────────────────────────────────────────────
# NOTE: this action is referenced by LOCAL PATH in all three active
# workflows and in downstream repos synced via .github/sync.yml.
# Any change here must be paired with a sync.yml update so downstream
# repos receive the new file.
# ─────────────────────────────────────────────────────────────────────

inputs:
  github-token:
    description: 'GITHUB_TOKEN for gh CLI calls'
    required: true
  comment-id:
    description: 'Numeric ID of the triggering comment'
    required: true
  repository:
    description: 'owner/repo for API calls (github.repository)'
    required: true
  run-id:
    description: 'GitHub Actions run ID for the status comment link'
    required: true
  server-url:
    description: 'GitHub server URL (github.server_url)'
    required: false
    default: 'https://github.com'
  # Lifecycle stage selector — callers set exactly one to 'true'.
  do-ack:
    description: 'Post eyes reaction + queued status comment'
    required: false
    default: 'false'
  do-running:
    description: 'Update status comment to running'
    required: false
    default: 'false'
  do-success:
    description: 'Post hooray reaction + update status to done'
    required: false
    default: 'false'
  do-failure:
    description: 'Post -1 reaction + update status to failed'
    required: false
    default: 'false'
  process-label:
    description: 'Human-readable process label shown in the status comment'
    required: false
    default: 'OpenCode'

outputs:
  status-comment-id:
    description: 'ID of the sticky status comment (set by do-ack)'
    value: ${{ steps.ack-status.outputs.comment_id }}

runs:
  using: composite
  steps:

    # ── ACK ────────────────────────────────────────────────────────
    # Immediately post 👀 to the trigger comment and create the
    # sticky status comment in a queued/running state.
    # ─────────────────────────────────────────────────────────────
    - name: Ack — eyes reaction + queued status comment
      id: ack-status
      if: inputs.do-ack == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        RUN_URL: ${{ inputs.server-url }}/${{ inputs.repository }}/actions/runs/${{ inputs.run-id }}
        COMMENT_ID: ${{ inputs.comment-id }}
        REPO: ${{ inputs.repository }}
        LABEL: ${{ inputs.process-label }}
      run: |
        # React 👀 on the trigger comment (try issue-comment first, fall back to pull-comment)
        gh api --method POST \
          "/repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
          -f content='eyes' 2>/dev/null || \
        gh api --method POST \
          "/repos/${REPO}/pulls/comments/${COMMENT_ID}/reactions" \
          -f content='eyes' 2>/dev/null || true

        # Post the initial queued/running status comment.
        # Embed a hidden marker so we can find and edit it later.
        BODY="<!-- opencode-status-marker: ${COMMENT_ID} -->
        **${LABEL}** — ⏳ Running… ([view run](${RUN_URL}))"

        # Detect issue vs PR context from the comment endpoint
        ISSUE_NUMBER=$(gh api "/repos/${REPO}/issues/comments/${COMMENT_ID}" \
          --jq '.issue_url | split("/") | last' 2>/dev/null || echo "")

        if [[ -n "$ISSUE_NUMBER" ]]; then
          CREATED=$(gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "$BODY" 2>/dev/null || echo "")
        else
          # Fallback: determine PR number from the pull review comment
          PR_NUMBER=$(gh api "/repos/${REPO}/pulls/comments/${COMMENT_ID}" \
            --jq '.pull_request_url | split("/") | last' 2>/dev/null || echo "")
          if [[ -n "$PR_NUMBER" ]]; then
            CREATED=$(gh pr comment "$PR_NUMBER" \
              --repo "$REPO" \
              --body "$BODY" 2>/dev/null || echo "")
          fi
        fi

        # Extract the new comment ID for later edits (from gh output URL or API)
        STATUS_ID=$(gh api "/repos/${REPO}/issues/comments" \
          --jq "[.[] | select(.body | startswith(\"<!-- opencode-status-marker: ${COMMENT_ID} -->\"))] | last | .id" \
          2>/dev/null || echo "")

        echo "comment_id=${STATUS_ID}" >> "$GITHUB_OUTPUT"

    # ── RUNNING ─────────────────────────────────────────────────────
    # Update the status comment to show work is actively running.
    # ─────────────────────────────────────────────────────────────────
    - name: Status — update to running
      if: inputs.do-running == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        RUN_URL: ${{ inputs.server-url }}/${{ inputs.repository }}/actions/runs/${{ inputs.run-id }}
        COMMENT_ID: ${{ inputs.comment-id }}
        REPO: ${{ inputs.repository }}
        LABEL: ${{ inputs.process-label }}
      run: |
        # Find the existing status comment by its marker
        STATUS_ID=$(gh api "/repos/${REPO}/issues/comments" \
          --jq "[.[] | select(.body | startswith(\"<!-- opencode-status-marker: ${COMMENT_ID} -->\"))] | last | .id" \
          2>/dev/null || echo "")
        if [[ -z "$STATUS_ID" || "$STATUS_ID" == "null" ]]; then
          echo "::warning::opencode-run: could not find status comment to update (running)"
          exit 0
        fi
        BODY="<!-- opencode-status-marker: ${COMMENT_ID} -->
        **${LABEL}** — 🤖 Working… ([view run](${RUN_URL}))"
        gh api --method PATCH \
          "/repos/${REPO}/issues/comments/${STATUS_ID}" \
          -f body="$BODY" 2>/dev/null || true

    # ── SUCCESS ─────────────────────────────────────────────────────
    # Post 🎉 reaction and flip status comment to done.
    # ─────────────────────────────────────────────────────────────────
    - name: React ✅ + status done
      if: inputs.do-success == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        RUN_URL: ${{ inputs.server-url }}/${{ inputs.repository }}/actions/runs/${{ inputs.run-id }}
        COMMENT_ID: ${{ inputs.comment-id }}
        REPO: ${{ inputs.repository }}
        LABEL: ${{ inputs.process-label }}
      run: |
        # React 🎉 (hooray) on the trigger comment
        gh api --method POST \
          "/repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
          -f content='hooray' 2>/dev/null || \
        gh api --method POST \
          "/repos/${REPO}/pulls/comments/${COMMENT_ID}/reactions" \
          -f content='hooray' 2>/dev/null || true

        # Flip status comment to done
        STATUS_ID=$(gh api "/repos/${REPO}/issues/comments" \
          --jq "[.[] | select(.body | startswith(\"<!-- opencode-status-marker: ${COMMENT_ID} -->\"))] | last | .id" \
          2>/dev/null || echo "")
        if [[ -n "$STATUS_ID" && "$STATUS_ID" != "null" ]]; then
          BODY="<!-- opencode-status-marker: ${COMMENT_ID} -->
        **${LABEL}** — ✅ Done ([view run](${RUN_URL}))"
          gh api --method PATCH \
            "/repos/${REPO}/issues/comments/${STATUS_ID}" \
            -f body="$BODY" 2>/dev/null || true
        fi

    # ── FAILURE ─────────────────────────────────────────────────────
    # Post 👎 reaction and flip status comment to failed.
    # ─────────────────────────────────────────────────────────────────
    - name: React ❌ + status failed
      if: inputs.do-failure == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        RUN_URL: ${{ inputs.server-url }}/${{ inputs.repository }}/actions/runs/${{ inputs.run-id }}
        COMMENT_ID: ${{ inputs.comment-id }}
        REPO: ${{ inputs.repository }}
        LABEL: ${{ inputs.process-label }}
      run: |
        # React 👎 on the trigger comment
        gh api --method POST \
          "/repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
          -f content='-1' 2>/dev/null || \
        gh api --method POST \
          "/repos/${REPO}/pulls/comments/${COMMENT_ID}/reactions" \
          -f content='-1' 2>/dev/null || true

        # Flip status comment to failed (with run link for diagnosis)
        STATUS_ID=$(gh api "/repos/${REPO}/issues/comments" \
          --jq "[.[] | select(.body | startswith(\"<!-- opencode-status-marker: ${COMMENT_ID} -->\"))] | last | .id" \
          2>/dev/null || echo "")
        if [[ -n "$STATUS_ID" && "$STATUS_ID" != "null" ]]; then
          BODY="<!-- opencode-status-marker: ${COMMENT_ID} -->
        **${LABEL}** — ❌ Failed — [check the run log](${RUN_URL}) for details"
          gh api --method PATCH \
            "/repos/${REPO}/issues/comments/${STATUS_ID}" \
            -f body="$BODY" 2>/dev/null || true
        fi
