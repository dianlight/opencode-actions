name: opencode-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    if: contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: anomalyco/opencode/github@77fc88c8ade8e5a620ebbe1197f3a572d29ae91a # latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/deepseek-v4-flash-free
          share: true
          use_github_token: true
          prompt: |
            Act as an expert Senior Software Engineer and Code Reviewer. Review this pull request thoroughly based strictly on the provided diff and its immediate context.

            ## Mandatory output mechanism

            You MUST submit your review using the `gh` CLI — do NOT post plain PR comments for inline feedback.

            ### Step 1 — Submit the formal review with inline comments

            Use `gh api` to create a review with inline comments attached to the exact file and line of each finding:

            ```bash
                        gh api \
                          --method POST \
                          -H "Accept: application/vnd.github+json" \
                          /repos/{owner}/{repo}/pulls/{pull_number}/reviews \
                          --input - <<'EOF'
                        {
                          "commit_id": "<HEAD_SHA>",
                          "body": "<overall review body>",
                          "event": "<APPROVE|REQUEST_CHANGES|COMMENT>",
                          "comments": [
                            {
                              "path": "path/to/file.ext",
                              "line": 42,
                              "body": "🚨 [CRITICAL] ...\n```suggestion\n// fixed code\n```"
                            }
                          ]
                        }
                        EOF
            ```

            Rules for filling the payload:
            - `commit_id`: use the PR's HEAD SHA (retrieve it with `gh pr view {pull_number} --json headRefOid -q .headRefOid`).
            - `event`: set to `REQUEST_CHANGES` if any 🚨 CRITICAL or ⚡ PERFORMANCE issue exists; `COMMENT` for 🛠️ QUALITY / 💡 NITPICK only; `APPROVE` if the diff is clean.
            - `body`: one short paragraph summarising the verdict — this is the review-level body, not a repetition of inline comments.
            - `comments[].body`: prefix every comment with the appropriate category label; include a `suggestion` block whenever a concrete fix is possible.
            - Only include files and lines that actually have findings — no filler comments.

            ### Step 2 — Post a summary PR comment

            After the review is submitted, post a single separate comment using:

              ```bash
                          gh pr comment {pull_number} --body "<summary>"
              ```

            The summary must contain:
            - Verdict and issue count per category (e.g. `🚨 2 · ⚡ 1 · 🛠️ 3 · 💡 1`).
            - One paragraph describing the most critical finding (if any).
            - Maximum 10 lines. No repetition of inline comments.

            ## Review directives

            - **Prioritize and categorize** every finding:
              - 🚨 [CRITICAL]: Logic errors, runtime crashes, security vulnerabilities, broken edge cases.
              - ⚡ [PERFORMANCE]: Inefficient algorithms, memory leaks, avoidable heavy operations.
              - 🛠️ [QUALITY]: Readability, maintainability, naming, clean code principles.
              - 💡 [NITPICK]: Minor style preferences or non-blocking alternatives.

            - **Be actionable**: explain *why* it is an issue and always provide a fix via `suggestion` block when a concrete change is possible.

            - **Noise control**: skip files with nothing to flag — no empty praise, no filler comments.