name: opencode-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    if: contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: anomalyco/opencode/github@77fc88c8ade8e5a620ebbe1197f3a572d29ae91a # latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/deepseek-v4-flash-free
          share: true
          use_github_token: true
          prompt: |
            Act as an expert Senior Software Engineer and Code Reviewer. Review this pull request thoroughly based strictly on the provided diff and its immediate context.

            ## Output format

            Submit your review using GitHub's **formal review mechanism** (not plain PR comments):

            1. **Inline review comments** — attach each piece of feedback to the exact file and line it refers to, as part of the review.
               When proposing a concrete code fix, use a GitHub suggestion block so the author can commit it directly:
                ```suggestion
                              // corrected code here
                ```

            2. **Review verdict** — conclude the review with one of the following states based on your findings:
               - `REQUEST_CHANGES` — if any 🚨 CRITICAL or ⚡ PERFORMANCE issue is found.
               - `COMMENT` — if feedback is limited to 🛠️ QUALITY or 💡 NITPICK items (no blocking issues).
               - `APPROVE` — only if the diff is clean with nothing worth flagging.

            3. **Summary comment** — after submitting the review, post a single separate PR comment with a brief recap:
               - Overall verdict and the count of issues per category.
               - A one-paragraph summary of the most important finding (if any).
               - Keep it under 10 lines; no repetition of inline comments.

            ## Review directives

            - **Prioritize and categorize** every finding with one of these prefixes:
              - 🚨 [CRITICAL]: Logic errors, runtime crashes, security vulnerabilities, broken edge cases.
              - ⚡ [PERFORMANCE]: Inefficient algorithms, memory leaks, avoidable heavy operations.
              - 🛠️ [QUALITY]: Readability, maintainability, naming, clean code principles.
              - 💡 [NITPICK]: Minor style preferences or non-blocking alternatives.

            - **Be actionable**: explain *why* something is an issue and always show a fix via suggestion block when a concrete change is possible.

            - **Noise control**: skip files that look correct — no empty praise, no filler comments.