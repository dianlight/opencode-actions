name: OpenCode Maintenance

on:
  schedule:
    # Runs every 7 days (at 00:00 on the 1st, 8th, 15th, 22nd, and 29th of the month)
    - cron: "0 0 */7 * *"
  workflow_dispatch: # Allows manual triggering from the GitHub UI
  push:
    branches:
      - main
    paths:
      - .github/workflows/opencode-maintenance.yaml

# Permissions required to read files, update README.md, and manage Issues
permissions:
  contents: write
  issues: write
  id-token: write

jobs:
  model-audit:
    name: Model Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # ── Setup Python via mise ───────────────────────────────────────────
      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Install Python dependencies
        run: pip install pyyaml requests

      # ── Lint YAML files ───────────────────────────────────────────────────
      - name: Lint YAML files
        run: yamllint .github .github/workflows config

      # ── Run maintenance script ───────────────────────────────────────────
      # The script:
      #   1. Fetches OpenCode Zen (free) and Go (paid) model catalogs
      #   2. Fetches latest LiveBench leaderboard data (CSV first, JSON fallback)
      #   3. Classifies workflows by task type (using config/task-types.yaml)
      #   4. Scores and recommends optimal models per task type
      #   5. Updates README.md with recommendation tables
      #   6. Audits workflows for model optimality (with status icons)
      #   7. Saves all intermediate data to data/*.json
      - name: Run OpenCode maintenance
        id: maintenance
        continue-on-error: true
        run: python scripts/opencode_maintenance.py

      # ── Commit README.md and data changes ────────────────────────────────
      - name: Commit changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "opencode-maintenance[bot]"
          git config user.email "opencode-maintenance[bot]@users.noreply.github.com"

          git add README.md data/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "ℹ No changes to commit"
          else
            git commit -m "📝 docs: update model recommendations and audit results"
            # Explicit auth and branch to avoid push failures with GITHUB_TOKEN
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin "HEAD:${GITHUB_REF_NAME}"
            echo "✓ Changes committed and pushed"
          fi

      # ── Check coverage and workflow audit, create issue if needed ──────
      - name: Create issue for detected problems
        if: hashFiles('data/coverage_issues.json') != '' || hashFiles('data/audit_results.json') != ''
        run: |
          # Check coverage issues
          STALE=$(python3 -c "import json; d=json.load(open('data/coverage_issues.json')); print(len(d.get('stale_fallback',[])))" 2>/dev/null || echo "0")
          MISSING=$(python3 -c "import json; d=json.load(open('data/coverage_issues.json')); print(len(d.get('missing_scores',[])))" 2>/dev/null || echo "0")

          # Check workflow audit suboptimal count
          SUBOPTIMAL=$(python3 -c "
          import json
          with open('data/audit_results.json') as f:
              d = json.load(f)
          count = sum(1 for r in d.get('results', []) if r.get('status') in ('\u26a0\ufe0f', '\u274c'))
          print(count)
          " 2>/dev/null || echo "0")

          if [ "$STALE" = "0" ] && [ "$MISSING" = "0" ] && [ "$SUBOPTIMAL" = "0" ]; then
            echo "✓ No issues detected — skipping issue creation"
            exit 0
          fi

          # Generate issue body with Python (handles newlines correctly)
          python3 << 'PYEOF' > /tmp/issue_body.md
          import json
          from datetime import datetime, timezone

          with open("data/coverage_issues.json") as f:
              coverage = json.load(f)
          with open("data/audit_results.json") as f:
              audit = json.load(f)

          stale = coverage.get("stale_fallback", [])
          missing = coverage.get("missing_scores", [])
          results = audit.get("results", [])
          suboptimal = [r for r in results if r.get("status") in ("\u26a0\ufe0f", "\u274c")]

          lines = [
              "# OpenCode Maintenance Report",
              "",
              "> Automatically detected by the `opencode-maintenance` workflow.",
              f"> Run date: {datetime.now(timezone.utc).strftime('%Y-%m-%d')}",
              "",
          ]

          if stale or missing:
              lines.append("## \U0001f4cb Model Coverage Issues")
              lines.append("")

          if stale:
              lines.append("### Stale Fallback Entries")
              lines.append("")
              lines.append(
                  "The following models are in `config/model-scores.yaml` but are "
                  "**already available on LiveBench**. "
                  "Consider removing them from the static config."
              )
              lines.append("")
              lines.append("| Model | LiveBench Score |")
              lines.append("|-------|-----------------|")
              for m in stale:
                  lb = m.get("livebench_scores", {})
                  ov = lb.get("overall", "?")
                  lines.append(f"| {m['model']} | overall={ov} |")
              lines.append("")

          if missing:
              lines.append("### Models Missing Score Data")
              lines.append("")
              lines.append(
                  "The following OpenCode models have **no score data** "
                  "from LiveBench or the static fallback. "
                  "Consider adding them to `config/model-scores.yaml`."
              )
              lines.append("")
              lines.append("| Model | Tier |")
              lines.append("|-------|------|")
              for m in missing:
                  lines.append(f"| {m['model']} | {m['tier']} |")
              lines.append("")

          if suboptimal:
              lines.append("## \u26a0\ufe0f Suboptimal Workflow Configurations")
              lines.append("")
              lines.append("The following workflows use a model that is not optimal.")
              lines.append("")
              lines.append("| Workflow | Job | Step | Current Model | Recommended Free | Recommended Go | Status |")
              lines.append("|----------|-----|------|---------------|------------------|----------------|--------|")
              for r in suboptimal:
                  status = r.get("status", "")
                  rec_free = r.get("recommended_free") or "\u2014"
                  rec_go   = r.get("recommended_go")   or "\u2014"
                  pref     = r.get("preferred_tier")
                  diff     = r.get("preferred_diff")
                  diff_str = f" (+{diff}%)" if diff and diff > 0 else ""
                  if pref == "free":
                      free_cell = f"\U0001f3c6 {rec_free}"
                      go_cell   = rec_go
                  elif pref == "go":
                      free_cell = rec_free
                      go_cell   = f"\U0001f3c6 {rec_go}{diff_str}"
                  else:
                      free_cell = rec_free
                      go_cell   = rec_go
                  lines.append(
                      f"| {r['workflow']} | {r['job']} | {r['step']} "
                      f"| {r['current_model']} | {free_cell} | {go_cell} | {status} |"
                  )
              lines.append("")

          lines.append("---")
          lines.append("*Generated by `opencode-maintenance` workflow.*")

          print("\n".join(lines))
          PYEOF

          # Check if an open issue with label already exists
          EXISTING=$(gh issue list --label "maintenance" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body-file /tmp/issue_body.md
            echo "\u2713 Updated existing issue #$EXISTING"
          else
            gh issue create \
              --title "[Model Audit] OpenCode maintenance issues detected" \
              --label "maintenance" \
              --body-file /tmp/issue_body.md
            echo "\u2713 Created new issue"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Summary ──────────────────────────────────────────────────────────
      - name: Show summary
        if: always()
        run: |
          echo "## OpenCode Maintenance Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/audit_results.json ]; then
            python3 -c "
          import json
          with open('data/audit_results.json') as f:
              data = json.load(f)
          print(f'- LiveBench models scored: **{data[\"livebench_models\"]}**')
          print(f'- Free models available: **{data[\"free_models\"]}**')
          print(f'- Go (paid) models available: **{data[\"go_models\"]}**')
          print(f'- Workflows audited: **{data[\"workflows_audited\"]}**')
          print(f'- Steps checked: **{data[\"steps_audited\"]}**')
          print(f'- Timestamp: {data[\"timestamp\"]}')
          print()
          results = data.get('results', [])
          for r in results:
              if r.get('status') == 'parse_error':
                  print(f'- ❌ Parse error in \`{r[\"file\"]}\`: {r[\"error\"]}')
              else:
                  icon = r.get('status', '❓')
                  print(
                      f'- {icon} \`{r["workflow"]}\` / \`{r["job"]}\` / \`{r["step"]}\` '
                      f'— current: \`{r["current_model"]}\`, '
                      f'suggested free: \`{r["recommended_free"]}\`'
                  )
          " >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠ No audit results found" >> $GITHUB_STEP_SUMMARY
          fi
