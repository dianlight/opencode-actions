name: OpenCode Maintenance

on:
  schedule:
    # Runs every 7 days (at 00:00 on the 1st, 8th, 15th, 22nd, and 29th of the month)
    - cron: "0 0 */7 * *"
  workflow_dispatch: # Allows manual triggering from the GitHub UI

# Permissions required to read files, update README.md, and manage Issues
permissions:
  contents: write
  issues: write
  id-token: write

jobs:
  model-audit:
    name: Model Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Setup Python ─────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests

      # ── Run maintenance script ───────────────────────────────────────────
      # The script:
      #   1. Fetches OpenCode Zen (free) and Go (paid) model catalogs
      #   2. Fetches latest LiveBench leaderboard data (CSV first, JSON fallback)
      #   3. Classifies workflows by task type (using config/task-types.yaml)
      #   4. Scores and recommends optimal models per task type
      #   5. Updates README.md with recommendation tables
      #   6. Audits workflows for model optimality (with status icons)
      #   7. Saves all intermediate data to data/*.json
      - name: Run OpenCode maintenance
        id: maintenance
        continue-on-error: true
        run: python scripts/opencode_maintenance.py

      # ── Commit README.md and data changes ────────────────────────────────
      - name: Commit changes
        run: |
          git config user.name "opencode-maintenance[bot]"
          git config user.email "opencode-maintenance[bot]@users.noreply.github.com"

          git add README.md data/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "ℹ No changes to commit"
          else
            git commit -m "📝 docs: update model recommendations and audit results"
            git push
            echo "✓ Changes committed and pushed"
          fi

      # ── Check coverage and create issue if needed ──────────────────────
      - name: Create issue for coverage problems
        if: hashFiles('data/coverage_issues.json') != ''
        run: |
          STALE=$(python3 -c "import json; d=json.load(open('data/coverage_issues.json')); print(len(d.get('stale_fallback',[])))")
          MISSING=$(python3 -c "import json; d=json.load(open('data/coverage_issues.json')); print(len(d.get('missing_scores',[])))")

          if [ "$STALE" = "0" ] && [ "$MISSING" = "0" ]; then
            echo "✓ No coverage issues — skipping issue creation"
            exit 0
          fi

          BODY="# Model Coverage Issues\n\n"
          BODY+="> Automatically detected by the \`opencode-maintenance\` workflow.\n\n"

          if [ "$STALE" != "0" ]; then
            BODY+="## Stale Fallback Entries\n\n"
            BODY+="The following models are in \`config/model-scores.yaml\` but are **already available on LiveBench**.\n"
            BODY+="Consider removing them from the static config.\n\n"
            BODY+="| Model | LiveBench Score |\n"
            BODY+="|-------|-----------------|\n"
            python3 << 'PYEOF' >> /tmp/coverage_body.md
          import json
          with open("data/coverage_issues.json") as f:
              d = json.load(f)
          for m in d.get("stale_fallback", []):
              lb = m.get("livebench_scores", {})
              ov = lb.get("overall", "?")
              print(f"| {m['model']} | overall={ov} |")
          PYEOF
            BODY+=$(cat /tmp/coverage_body.md)
            BODY+="\n\n"
          fi

          if [ "$MISSING" != "0" ]; then
            BODY+="## Models Missing Score Data\n\n"
            BODY+="The following OpenCode models have **no score data** from LiveBench or the static fallback.\n"
            BODY+="Consider adding them to \`config/model-scores.yaml\`.\n\n"
            BODY+="| Model | Tier |\n"
            BODY+="|-------|------|\n"
            python3 << 'PYEOF' >> /tmp/coverage_body.md
          import json
          with open("data/coverage_issues.json") as f:
              d = json.load(f)
          for m in d.get("missing_scores", []):
              print(f"| {m['model']} | {m['tier']} |")
          PYEOF
            BODY+=$(cat /tmp/coverage_body.md)
            BODY+="\n\n"
          fi

          BODY+="---\n*Generated by \`opencode-maintenance\` workflow.*"

          # Check if an open issue already exists
          EXISTING=$(gh issue list --label "maintenance" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "Coverage issues detected on $(date -u +%Y-%m-%d):"
            gh issue comment "$EXISTING" --body "$BODY"
            echo "✓ Commented on existing issue #$EXISTING"
          else
            gh issue create \
              --title "[Model Audit] Model coverage issues detected" \
              --label "maintenance" \
              --body "$BODY"
            echo "✓ Created new issue"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Summary ──────────────────────────────────────────────────────────
      - name: Show summary
        if: always()
        run: |
          echo "## OpenCode Maintenance Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/audit_results.json ]; then
            python3 -c "
          import json
          with open('data/audit_results.json') as f:
              data = json.load(f)
          print(f'- LiveBench models scored: **{data[\"livebench_models\"]}**')
          print(f'- Free models available: **{data[\"free_models\"]}**')
          print(f'- Go (paid) models available: **{data[\"go_models\"]}**')
          print(f'- Workflows audited: **{data[\"workflows_audited\"]}**')
          print(f'- Steps checked: **{data[\"steps_audited\"]}**')
          print(f'- Timestamp: {data[\"timestamp\"]}')
          print()
          results = data.get('results', [])
          for r in results:
              if r.get('status') == 'parse_error':
                  print(f'- ❌ Parse error in \`{r[\"file\"]}\`: {r[\"error\"]}')
              else:
                  icon = r.get('status', '❓')
                  print(f'- {icon} \`{r[\"workflow\"]}\` / \`{r[\"job\"]}\` / \`{r[\"step\"]}\` — current: \`{r[\"current_model\"]}\`, suggested free: \`{r[\"recommended_free\"]}\`')
          " >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠ No audit results found" >> $GITHUB_STEP_SUMMARY
          fi
