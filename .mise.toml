[tools]
python = "3.14"
yamllint = "1.38"

[hooks]
postinstall = ["pip install -r requirements.txt"]

[tasks.maintenance]
run = "python scripts/opencode_maintenance.py"
description = "Run the OpenCode maintenance script"

[tasks.lint-yaml]
run = "yamllint .github .github/workflows config"
description = "Lint all YAML files"